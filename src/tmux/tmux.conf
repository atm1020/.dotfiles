set -g default-terminal "tmux-256color"
# True color for Neovim inside tmux (covers xterm/kitty/alacritty/etc.).
set -as terminal-features ",*:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g extended-keys on

# Change prefix to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Put the status bar at the top and refresh it often enough to notice new/closed sessions.
set -g status-position top
set -g status-interval 2
# Let terminal-native notifications (for example pi-alert's Ghostty OSC 777)
# pass through tmux when an extension uses tmux passthrough.
set -g allow-passthrough on
# OneDark darker palette, matching ~/.config/nvim onedark.nvim style = 'darker'.
set -g status-style 'fg=#abb2bf,bg=#1f2329'
set -g status-right-length 60
set -g status-right '#[fg=#1f2329,bg=#d19a66,bold] #{pane_current_command} #[fg=#abb2bf,bg=#1f2329,nobold]'

set -g pane-border-style 'fg=#3b4048'
set -g pane-active-border-style 'fg=#d19a66'
set -g message-style 'fg=#abb2bf,bg=#2c313a'
set -g message-command-style 'fg=#d19a66,bg=#2c313a'
set -g mode-style 'fg=#1f2329,bg=#d19a66,bold'

# Hide the default tmux window list; session list on the left is enough.
set -g window-status-format ''
set -g window-status-current-format ''

# Show all running sessions in the status bar. The active session is highlighted.
# The number shown before each session is the key to switch to it with prefix+number.
set -g status-left-length 120
set -g status-left '#($HOME/.dotfiles/src/tmux/tmux-session-status.sh "#{session_name}") '

# # Start from window index 1
set -g base-index 1

# Switch to the Nth running session with prefix+1..9, and prefix+0 for the 10th.
# If the slot does not exist, show a clear tmux message instead of failing silently.
bind-key 1 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 1'
bind-key 2 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 2'
bind-key 3 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 3'
bind-key 4 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 4'
bind-key 5 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 5'
bind-key 6 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 6'
bind-key 7 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 7'
bind-key 8 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 8'
bind-key 9 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 9'
bind-key 0 run-shell '$HOME/.dotfiles/src/tmux/tmux-switch-session-by-number.sh 10'

bind-key -n "C-f" new-window -n sessionizer '/bin/zsh -lc tmux-sessionizer'
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"
# Toggle spotify popup; session stays alive when the popup closes.
bind-key m if-shell -F '#{==:#{session_name},spotify}' {
  detach-client
} {
  display-popup -w 90% -h 90% -E 'tmux new-session -A -s spotify spotify_player'
}
# Ctrl-c closes the spotify popup only; spotify_player keeps running.
bind-key -n C-c if-shell -F '#{==:#{session_name},spotify}' {
  detach-client
} {
  send-keys C-c
}

# # Agent notifications
setw -g monitor-bell on
set -g bell-action any # show bell alerts from any window/session
setw -g window-status-bell-style 'fg=#e06c75 underscore'
bind-key s choose-tree -s

bind-key p run-shell 'rm -f "/tmp/tmux-agent-done/#{session_name}"' \; refresh-client -S \; split-window -h -c "#{pane_current_path}" "pi"

# Clear file-based agent alerts when you visit/switch to the session, like tmux
# native bell alerts.
set-hook -g client-session-changed 'run-shell "rm -f /tmp/tmux-agent-done/#{session_name}; tmux refresh-client -S"'
set-hook -g client-attached 'run-shell "rm -f /tmp/tmux-agent-done/#{session_name}; tmux refresh-client -S"'

bind-key c run-shell 'rm -f "/tmp/tmux-agent-done/#{session_name}"' \; refresh-client -S \; split-window -h -c "#{pane_current_path}" "$HOME/.dotfiles/src/tmux/tmux-agent-run.sh claude claude"
bind-key C run-shell 'rm -f "/tmp/tmux-agent-done/#{session_name}"' \; refresh-client -S \; split-window -v -c "#{pane_current_path}" "$HOME/.dotfiles/src/tmux/tmux-agent-run.sh claude claude"

bind-key o run-shell 'rm -f "/tmp/tmux-agent-done/#{session_name}"' \; refresh-client -S \; split-window -h -c "#{pane_current_path}" "$HOME/.dotfiles/src/tmux/tmux-agent-run.sh opencode opencode"
bind-key O run-shell 'rm -f "/tmp/tmux-agent-done/#{session_name}"' \; refresh-client -S \; split-window -v -c "#{pane_current_path}" "$HOME/.dotfiles/src/tmux/tmux-agent-run.sh opencode opencode"


bind [ select-pane -L 
bind ] select-pane -R

# Pane borders: show a very visible title on the active pane border, like old_tmux.conf.
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-style 'fg=#3b4048,bg=default'
set -g pane-active-border-style 'fg=#d19a66,bg=#1f2329,bold'
# Keep format simple; tmux conditionals do not like commas inside nested style tags.
set -g pane-border-format ' #{?pane_active,ACTIVE ,}#P #{pane_current_command} '

bind-key n switch-client -n  # next session
bind-key N switch-client -p  # previous session
bind f resize-pane -Z

# bind q copy-mode


# bind  select-pane -D
# bind  select-pane -U


# Enter tmux's copy/scroll mode with Prefix + v.
bind-key v copy-mode

# Open the pane's full scrollback in a read-only Vim split with Prefix + u.
bind-key u capture-pane -S - \; split-window -h -c "#{pane_current_path}" "tmux save-buffer - | nvim -R -c 'set number' -"

# Vi-style copy-mode bindings
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
