- name: Link helper scripts
  file:
    owner: '{{ user }}'
    group: '{{ user }}'
    src: '{{ project_src_path }}/scripts/{{ item }}'
    dest: '/usr/local/bin/{{ item }}'
    state: link
    force: true
    mode: '0755'
  loop:
    - '{{ tmux_sessionizer }}'
  tags: &tags_for_bins 'scripts'

- name: Download ansible-playbook-run installer
  get_url:
    url: https://raw.githubusercontent.com/atm1020/ansible-playbook-run/main/installer.sh
    dest: /tmp/ansible-playbook-run-installer.sh
    mode: '0755'
  tags: *tags_for_bins

- name: Install ansible-playbook-run
  command: /tmp/ansible-playbook-run-installer.sh -p {{ user_home_path }}/.dotfiles/local.yml
  become: true
  tags: *tags_for_bins

- name: Remove ansible-playbook-run installer
  file:
    path: /tmp/ansible-playbook-run-installer.sh
    state: absent
  tags: *tags_for_bins
